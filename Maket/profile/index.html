<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>
    <link rel="stylesheet" href="../src/styles/profile.css">
    <link rel="stylesheet" href="../src/styles/main.css">
</head>
<body>
    <nav class="nav">
        <div class="nav__home"><img src="../src/images/home.png" alt="home"></div>
        <div class="nav__profile"><img src="../src/images/profileOn.png" alt="profile"></div>
        <div class="nav__add"><img src="../src/images/add.png" alt="add"></div>
    </nav>
    <div class="profile">
        <div class="profile__avatar">
            <img src="../src/images/AvatarBig.png" alt="avatar-photo">
        </div>
        <div class="profile__description">
            <div class="profile__name">
                <span class="profile__name-text">Ваня Денисов</span>
            </div>
            <div class="profile__about">
                <span class="profile__about-text">Привет! Я системный аналитик в ACME :) Тут моя жизнь только для самых классных!</span>
            </div>
        </div>
        <div class="profile__posts">
            <div class="profile__posts-icon">
                <img src="../src/images/post.png" alt="post">
            </div>
            <div class="profile__posts-count">43 поста</div>
        </div>
    </div>
    <div class="profile__gallery">
        <img src="../src/images/1.png" alt="images" class="profile__gallery-image">
        <img src="../src/images/2.png" alt="images" class="profile__gallery-image">
        <img src="../src/images/3.png" alt="images" class="profile__gallery-image">
        <img src="../src/images/4.png" alt="images" class="profile__gallery-image">
        <img src="../src/images/5.png" alt="images" class="profile__gallery-image">
        <img src="../src/images/6.png" alt="images" class="profile__gallery-image">
        <img src="../src/images/7.png" alt="images" class="profile__gallery-image">
        <img src="../src/images/8.png" alt="images" class="profile__gallery-image">
        <img src="../src/images/9.png" alt="images" class="profile__gallery-image">
    </div>
</body>
</html>
